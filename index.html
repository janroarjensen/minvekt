<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Firestore Test</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#0b1220;color:#e5eefb;margin:0;padding:24px}
    .wrap{max-width:980px;margin:0 auto}
    .card{background:#111a2e;border:1px solid #2a3b5f;border-radius:16px;padding:18px;margin-bottom:16px}
    h1,h2{margin:0 0 12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}
    label{display:block;margin-bottom:6px;font-weight:600}
    input,button,textarea{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #334a74;background:#0f1830;color:#fff;padding:12px}
    button{cursor:pointer;font-weight:700}
    .row{display:flex;gap:10px;flex-wrap:wrap}.row button{width:auto}
    .ok{color:#86efac}.warn{color:#fde68a}.err{color:#fca5a5}.info{color:#93c5fd}
    pre{white-space:pre-wrap;word-break:break-word;background:#0a1326;border:1px solid #22314f;padding:12px;border-radius:12px}
    table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #22314f;padding:10px;text-align:left;vertical-align:top}th{background:#0d162b}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Minimal Firebase / Firestore-test</h1>
    <p>Denne siden tester bare tre ting: <strong>Firebase init</strong>, <strong>Auth</strong> og <strong>Firestore getDoc/setDoc</strong>. Bruk denne for å finne ut om problemet ligger i miljøet ditt eller i fullappen.</p>
    <div id="env"></div>
  </div>

  <div class="card">
    <h2>1. Innlogging</h2>
    <div class="grid">
      <div><label for="email">E-post</label><input id="email" type="email" placeholder="deg@epost.no"></div>
      <div><label for="password">Passord</label><input id="password" type="password" placeholder="Minst 6 tegn"></div>
      <div><label for="name">Navn (bare ved oppretting)</label><input id="name" type="text" placeholder="Valgfritt"></div>
      <div class="full row">
        <button id="loginBtn">Logg inn</button>
        <button id="signupBtn">Opprett bruker</button>
        <button id="resetBtn">Send passordreset</button>
        <button id="logoutBtn">Logg ut</button>
      </div>
    </div>
    <div id="authStatus" class="info" style="margin-top:12px">Ikke startet</div>
  </div>

  <div class="card">
    <h2>2. Firestore-test</h2>
    <div class="grid">
      <div><label for="docPath">Dokumentsti</label><input id="docPath" type="text" value="users/{uid}/app/main"></div>
      <div><label for="testValue">Testverdi</label><input id="testValue" type="text" value="hei fra testside"></div>
      <div class="full row">
        <button id="readBtn">Test getDoc</button>
        <button id="writeBtn">Test setDoc</button>
        <button id="bothBtn">Kjør begge</button>
      </div>
    </div>
    <table>
      <thead><tr><th>Test</th><th>Status</th><th>Detalj</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>3. Rå output</h2>
    <pre id="rawOut">Ingen output enda.</pre>
  </div>
</div>

<script>
window.__FIREBASE_CONFIG__ = {
  apiKey: "AIzaSyBLj-nOSkauQwFpbg2dUysRfuAQX3lHEjc",
  authDomain: "minvekt-6a728.firebaseapp.com",
  databaseURL: "https://minvekt-6a728-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "minvekt-6a728",
  storageBucket: "minvekt-6a728.firebasestorage.app",
  messagingSenderId: "481947013806",
  appId: "1:481947013806:web:6bdeea7fb51da4ad2e133f",
  measurementId: "G-326ECRK19X"
};
</script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

  const $ = id => document.getElementById(id);
  let app=null, auth=null, db=null, user=null;
  const resultBody = $('resultBody');

  function envLine(text, cls='info'){
    const div=document.createElement('div');
    div.className=cls; div.textContent=text; $('env').appendChild(div);
  }
  function addRow(test, status, detail=''){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${test}</td><td>${status}</td><td>${detail}</td>`;
    resultBody.appendChild(tr);
  }
  function clearRows(){ resultBody.innerHTML=''; }
  function setAuthStatus(text, cls='info'){ $('authStatus').className=cls; $('authStatus').textContent=text; refreshRaw(); }
  function refreshRaw(extra={}){
    $('rawOut').textContent = JSON.stringify({
      href: location.href,
      protocol: location.protocol,
      online: navigator.onLine,
      firebaseConfig: { authDomain: window.__FIREBASE_CONFIG__.authDomain, projectId: window.__FIREBASE_CONFIG__.projectId },
      currentUser: user ? { uid:user.uid, email:user.email, displayName:user.displayName } : null,
      ...extra
    }, null, 2);
  }
  function resolvedPath(){
    const tpl = $('docPath').value.trim() || 'users/{uid}/app/main';
    return tpl.replace('{uid}', user?.uid || 'MANGLER_UID');
  }
  function asSegments(path){ return path.split('/').filter(Boolean); }

  envLine(`Protocol: ${location.protocol}`, location.protocol === 'file:' ? 'warn' : 'ok');
  envLine(`Browser online: ${navigator.onLine ? 'Ja' : 'Nei'}`, navigator.onLine ? 'ok' : 'err');
  envLine(`URL: ${location.href}`, 'info');
  if(location.protocol === 'file:') envLine('Du kjører som file://. Test helst via http://localhost for å utelukke miljøproblem.', 'warn');

  try {
    app = initializeApp(window.__FIREBASE_CONFIG__);
    auth = getAuth(app);
    db = getFirestore(app);
    envLine('Firebase init: OK', 'ok');
    onAuthStateChanged(auth, u => {
      user = u || null;
      if(user) setAuthStatus(`Innlogget som ${user.email || user.uid}`, 'ok');
      else setAuthStatus('Ikke logget inn', 'warn');
      refreshRaw();
    });
  } catch (err) {
    envLine('Firebase init feilet: ' + err.message, 'err');
    refreshRaw({ initError: err.message });
  }

  $('loginBtn').onclick = async () => {
    try {
      setAuthStatus('Logger inn…', 'info');
      await signInWithEmailAndPassword(auth, $('email').value.trim(), $('password').value);
      setAuthStatus('Innlogging OK', 'ok');
    } catch (err) {
      setAuthStatus('Innlogging feilet: ' + err.message, 'err');
      refreshRaw({ loginError: err.message });
    }
  };

  $('signupBtn').onclick = async () => {
    try {
      setAuthStatus('Oppretter bruker…', 'info');
      const cred = await createUserWithEmailAndPassword(auth, $('email').value.trim(), $('password').value);
      if($('name').value.trim()) await updateProfile(cred.user, { displayName: $('name').value.trim() });
      setAuthStatus('Bruker opprettet OK', 'ok');
    } catch (err) {
      setAuthStatus('Oppretting feilet: ' + err.message, 'err');
      refreshRaw({ signupError: err.message });
    }
  };

  $('resetBtn').onclick = async () => {
    try {
      await sendPasswordResetEmail(auth, $('email').value.trim());
      setAuthStatus('Reset-mail sendt', 'ok');
    } catch (err) {
      setAuthStatus('Reset feilet: ' + err.message, 'err');
      refreshRaw({ resetError: err.message });
    }
  };

  $('logoutBtn').onclick = async () => {
    try { await signOut(auth); setAuthStatus('Logget ut', 'warn'); }
    catch(err){ setAuthStatus('Logout feilet: ' + err.message, 'err'); }
  };

  async function testRead(){
    clearRows();
    addRow('Protocol', location.protocol === 'file:' ? 'PROBLEM' : 'OK', location.href);
    addRow('Browser online', navigator.onLine ? 'OK' : 'PROBLEM', navigator.onLine ? 'navigator.onLine=true' : 'navigator.onLine=false');
    addRow('Auth user', user ? 'OK' : 'PROBLEM', user ? (user.email || user.uid) : 'Ingen innlogget bruker');
    if(!user){ refreshRaw({ readSkipped: 'no user' }); return; }
    const path = resolvedPath();
    addRow('Path', 'INFO', path);
    try {
      const ref = doc(db, ...asSegments(path));
      const snap = await getDoc(ref);
      addRow('getDoc', 'OK', snap.exists() ? 'Dokument finnes' : 'Dokument finnes ikke');
      refreshRaw({ lastRead: { path, exists: snap.exists(), data: snap.exists() ? snap.data() : null } });
    } catch (err) {
      addRow('getDoc', 'PROBLEM', err.message || String(err));
      refreshRaw({ lastReadError: err.message || String(err), path });
    }
  }

  async function testWrite(){
    clearRows();
    addRow('Protocol', location.protocol === 'file:' ? 'PROBLEM' : 'OK', location.href);
    addRow('Browser online', navigator.onLine ? 'OK' : 'PROBLEM', navigator.onLine ? 'navigator.onLine=true' : 'navigator.onLine=false');
    addRow('Auth user', user ? 'OK' : 'PROBLEM', user ? (user.email || user.uid) : 'Ingen innlogget bruker');
    if(!user){ refreshRaw({ writeSkipped: 'no user' }); return; }
    const path = resolvedPath();
    addRow('Path', 'INFO', path);
    try {
      const ref = doc(db, ...asSegments(path));
      const payload = { testValue: $('testValue').value, updatedAt: serverTimestamp(), from: 'minimal-testside' };
      await setDoc(ref, payload, { merge: true });
      addRow('setDoc', 'OK', 'Skriving fullført');
      refreshRaw({ lastWrite: { path, payload } });
    } catch (err) {
      addRow('setDoc', 'PROBLEM', err.message || String(err));
      refreshRaw({ lastWriteError: err.message || String(err), path });
    }
  }

  $('readBtn').onclick = testRead;
  $('writeBtn').onclick = testWrite;
  $('bothBtn').onclick = async () => {
    await testRead();
    await testWrite();
  };

  refreshRaw();
</script>
</body>
</html>
